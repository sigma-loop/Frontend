name: Deploy to S3 + CloudFront

# Builds the SPA against the production API URL and ships it to S3, then
# invalidates the CloudFront cache. Runs on every push to main.
#
# Required repo settings (Settings → Secrets and variables → Actions):
#   Variables:  VITE_API_BASE_URL  (e.g. https://api.sigmaloop.dpdns.org/api/v1)
#               S3_BUCKET          (e.g. sigmaloop-frontend)
#               CLOUDFRONT_ID      (e.g. E1ABCDEF234567)
#   Secrets:    AWS_ACCESS_KEY_ID
#               AWS_SECRET_ACCESS_KEY
#   (a deploy IAM user limited to that bucket + that distribution)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-frontend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Sync to S3
        run: |
          # Hashed assets are immutable → cache forever. index.html must never
          # be cached so new deploys are picked up immediately.
          aws s3 sync dist/ "s3://${{ vars.S3_BUCKET }}" --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude index.html
          aws s3 cp dist/index.html "s3://${{ vars.S3_BUCKET }}/index.html" \
            --cache-control "no-cache"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.CLOUDFRONT_ID }}" \
            --paths "/*"
